<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Angie K. Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf7f4;
      --text: #2e2a27;
      --muted: #8a7f78;
      --accent: #d96c4f;
      --accent-hover: #c05a3e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--text);
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .dot {
      color: var(--accent);
    }

    .tagline {
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 400;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: var(--accent);
      margin: 0 auto 2.5rem;
      border-radius: 2px;
    }

    .bio {
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--text);
      margin-bottom: 3rem;
    }

    .links {
      display: flex;
      gap: 1.25rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1.5px solid transparent;
      padding-bottom: 2px;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .links a:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      opacity: 0.6;
      letter-spacing: 0.03em;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="name">Angie K<span class="dot">.</span></h1>
    <p class="tagline">Developer &amp; Photographer &nbsp;·&nbsp; NYC</p>
    <div class="divider"></div>
    <p class="bio">
      CS student by day, photographer by golden hour.<br />
      Building things on the internet — one commit at a time.
    </p>
    <nav class="links">
      <a href="https://github.com/angie-kong" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.instagram.com/angiekstudio/" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:angie_kong@icloud.com">Email</a>
    </nav>
  </div>

  <p class="footer">angiek.studio &nbsp;·&nbsp; © 2026</p>

</body>
</html>
